<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <meta
      name="description"
      content="Architecture-led IT asset management platform for inventory, assignments, maintenance, and access control."
    />
    <title>IT Asset Manager | Architecture-led Control Tower</title>
    <script>
      (function () {
        var storageKey = "it-asset-manager-theme";
        var root = document.documentElement;
        var stored = null;

        try {
          stored = window.localStorage.getItem(storageKey);
        } catch (_error) {
          stored = null;
        }

        var systemDark =
          window.matchMedia &&
          window.matchMedia("(prefers-color-scheme: dark)").matches;
        var theme = stored === "light" || stored === "dark"
          ? stored
          : systemDark
            ? "dark"
            : "light";

        root.dataset.theme = theme;
        root.style.colorScheme = theme;
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
